services:
  events-service:
    build:
      context: .
      dockerfile: services/events-service/Dockerfile
    image: eventradar-events-service:local
    container_name: eventradar-events-service
    env_file:
      - .env
    expose:
      - "8001"
    environment:
      EVENTS_SERVICE_HOST: "0.0.0.0"
      EVENTS_SERVICE_PORT: "8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    image: eventradar-api:local
    container_name: eventradar-api
    ports:
      - "8000:8000"
    environment:
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      EVENTS_SERVICE_URL: "http://events-service:8001"
      CORS_ORIGINS: "http://localhost:5173,http://localhost:5678,http://127.0.0.1:5173,http://127.0.0.1:5678"
    depends_on:
      events-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
